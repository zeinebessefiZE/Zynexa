<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zynexa</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#000;overflow:hidden;font-family:'Courier New',monospace;height:100vh;width:100vw}
  #container{position:relative;width:100vw;height:100vh}
  #video{position:absolute;opacity:0;pointer-events:none;width:1px;height:1px}
  #overlay{position:absolute;top:0;left:0;width:100%;height:100%}
  #scanlines{
    position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10;
    background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.13) 3px,rgba(0,0,0,0.13) 4px)
  }
  #vignette{
    position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:11;
    background:radial-gradient(ellipse at center,transparent 45%,rgba(0,0,12,0.88) 100%)
  }
  #ui{
    position:absolute;top:20px;left:50%;transform:translateX(-50%);
    color:rgba(0,245,255,0.9);font-size:11px;letter-spacing:8px;text-transform:uppercase;
    text-shadow:0 0 20px #00f5ff,0 0 40px #00f5ff88;pointer-events:none;z-index:20;white-space:nowrap;
    animation:flicker 7s infinite
  }
  #status{
    position:absolute;bottom:24px;left:50%;transform:translateX(-50%);
    color:rgba(255,0,229,0.7);font-size:10px;letter-spacing:4px;
    text-shadow:0 0 12px #ff00e5;pointer-events:none;z-index:20
  }
  #fps{position:absolute;top:20px;right:22px;color:rgba(0,255,136,0.45);font-size:9px;letter-spacing:2px;pointer-events:none;z-index:20}
  #insta{
    position:absolute;bottom:24px;right:22px;
    color:rgba(0,245,255,0.6);font-size:10px;letter-spacing:3px;
    text-shadow:0 0 10px #00f5ff;pointer-events:none;z-index:20
  }
  #loading{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;z-index:30}
  #lt{color:cyan;font-size:13px;letter-spacing:5px;text-shadow:0 0 24px cyan;animation:pulse 1.4s ease-in-out infinite}
  #lb-wrap{margin-top:14px;width:180px;height:1px;background:rgba(0,245,255,0.15);overflow:hidden}
  #lb{height:100%;width:0%;background:linear-gradient(90deg,#00f5ff,#ff00e5);box-shadow:0 0 8px cyan;transition:width .3s}
  @keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}
  @keyframes flicker{0%,100%{opacity:1}91%{opacity:1}92%{opacity:.5}94%{opacity:1}96%{opacity:.7}98%{opacity:1}}
</style>
</head>
<body>
<div id="container">
  <video id="video" autoplay muted playsinline></video>
  <canvas id="overlay"></canvas>
  <div id="scanlines"></div>
  <div id="vignette"></div>
  <div id="ui">✦ &nbsp; Z Y N E X A &nbsp; ✦</div>
  <div id="status">INITIALIZING…</div>
  <div id="fps">-- FPS</div>
  <div id="insta">@zaynebcodes</div>
  <div id="loading">
    <div id="lt">LOADING HAND TRACKING…</div>
    <div id="lb-wrap"><div id="lb"></div></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
<script>
// ══════════════════════════════════════
// CONFIG
// ══════════════════════════════════════
const TIP_IDS     = [4,8,12,16,20];
const JOINT_R     = 3.5;
const MAX_DIST    = 800;
const LERP_S      = 0.2;
const TRAIL_LEN   = 24;
const TOUCH_PX    = 34;
const TOUCH_CD    = 260;

// Per-finger laser colors [core, glow]
const F_COLORS = [
  ['#ff00e5','#8800ff'],   // thumb   — magenta / violet
  ['#00f5ff','#0055ff'],   // index   — cyan / blue
  ['#00ffaa','#00ff44'],   // middle  — aqua / green
  ['#ffe600','#ff8800'],   // ring    — yellow / orange
  ['#ff3366','#ff00e5'],   // pinky   — rose / magenta
];

const JOINT_PAL = ['#00f5ff','#ff00e5','#ffe600','#00ff88','#ff7700','#8800ff','#ff3366'];

const EDGES = [
  [0,1],[1,2],[2,3],[3,4],
  [0,5],[5,6],[6,7],[7,8],
  [5,9],[9,10],[10,11],[11,12],
  [9,13],[13,14],[14,15],[15,16],
  [13,17],[17,18],[18,19],[19,20],[0,17]
];

// ══════════════════════════════════════
// DOM
// ══════════════════════════════════════
const video   = document.getElementById('video');
const canvas  = document.getElementById('overlay');
const ctx     = canvas.getContext('2d');
const statusEl= document.getElementById('status');
const fpsEl   = document.getElementById('fps');
const loadEl  = document.getElementById('loading');
const lb      = document.getElementById('lb');

let W=0,H=0;
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
window.addEventListener('resize',resize); resize();

// ══════════════════════════════════════
// STATE
// ══════════════════════════════════════
let hData={};
const particles=[], rings=[];
let lastTouch=new Array(5).fill(0);
const strPts=Array.from({length:5},()=>({lx:null,ly:null,rx:null,ry:null,vx:0,vy:0}));
// Physics spring state per endpoint
const springs=Array.from({length:5},()=>({
  lx:0,ly:0,lvx:0,lvy:0,
  rx:0,ry:0,rvx:0,rvy:0,
  init:false
}));
const trails={L:Array.from({length:5},()=>[]),R:Array.from({length:5},()=>[])};
let fpsF=0,fpsT=performance.now();

// Nebula clouds
const nebulae=Array.from({length:6},()=>({
  x:Math.random()*1920,y:Math.random()*1080,
  r:180+Math.random()*200,
  color:['#00f5ff','#ff00e5','#8800ff','#ff3366','#ffe600','#00ffaa'][Math.floor(Math.random()*6)],
  phase:Math.random()*Math.PI*2,
  spd:0.0003+Math.random()*0.0004
}));

// ══════════════════════════════════════
// MEDIAPIPE
// ══════════════════════════════════════
const hModel=new Hands({locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
hModel.setOptions({maxNumHands:2,modelComplexity:1,minDetectionConfidence:0.72,minTrackingConfidence:0.55});
hModel.onResults(r=>{
  hData={};
  if(r.multiHandLandmarks&&r.multiHandedness)
    r.multiHandedness.forEach((h,i)=>{ hData[h.label]=r.multiHandLandmarks[i]; });
});

let barP=0;
const barT=setInterval(()=>{barP=Math.min(barP+Math.random()*9,90);lb.style.width=barP+'%';},160);

navigator.mediaDevices.getUserMedia({video:{facingMode:'user',width:1280,height:720}})
  .then(s=>{
    video.srcObject=s;
    video.onloadedmetadata=()=>{
      video.play();
      new Camera(video,{onFrame:async()=>{await hModel.send({image:video});},width:1280,height:720}).start();
      clearInterval(barT); lb.style.width='100%';
      setTimeout(()=>loadEl.style.display='none',400);
      statusEl.textContent='SHOW BOTH HANDS';
    };
  })
  .catch(e=>{clearInterval(barT);loadEl.innerHTML=`<span style="color:#ff4444;letter-spacing:2px">CAMERA DENIED<br><small style="opacity:.5">${e.message}</small></span>`;});

// ══════════════════════════════════════
// MATH
// ══════════════════════════════════════
const lerp=(a,b,t)=>a+(b-a)*t;
const dist=(ax,ay,bx,by)=>{const dx=ax-bx,dy=ay-by;return Math.sqrt(dx*dx+dy*dy);};
const px=lm=>({x:(1-lm.x)*W,y:lm.y*H});
function ha(hex,a){return hex+Math.round(Math.max(0,Math.min(1,a))*255).toString(16).padStart(2,'0');}

// Spring physics — smooth elastic
const SPRING_K=0.28, SPRING_D=0.72;
function springStep(cur,vel,target){
  const f=(target-cur)*SPRING_K;
  vel=(vel+f)*SPRING_D;
  return {v:vel,p:cur+vel};
}

// ══════════════════════════════════════
// NEBULA BACKGROUND
// ══════════════════════════════════════
function drawNebulae(t){
  nebulae.forEach(n=>{
    const ox=Math.sin(t*n.spd+n.phase)*60;
    const oy=Math.cos(t*n.spd*0.7+n.phase)*40;
    const nx=(n.x+ox+W)%W, ny=(n.y+oy+H)%H;
    const g=ctx.createRadialGradient(nx,ny,0,nx,ny,n.r);
    g.addColorStop(0,ha(n.color,0.045));
    g.addColorStop(0.5,ha(n.color,0.02));
    g.addColorStop(1,ha(n.color,0));
    ctx.save();ctx.fillStyle=g;
    ctx.beginPath();ctx.ellipse(nx,ny,n.r,n.r*.55,t*n.spd*.3,0,Math.PI*2);ctx.fill();
    ctx.restore();
  });
}

// ══════════════════════════════════════
// STAR FIELD (static, drawn once to offscreen)
// ══════════════════════════════════════
let starCanvas=null;
function buildStars(){
  starCanvas=document.createElement('canvas');
  starCanvas.width=W; starCanvas.height=H;
  const sc=starCanvas.getContext('2d');
  for(let i=0;i<120;i++){
    const x=Math.random()*W, y=Math.random()*H;
    const r=Math.random()*1.2;
    const a=0.15+Math.random()*0.5;
    sc.fillStyle=`rgba(255,255,255,${a})`;
    sc.beginPath();sc.arc(x,y,r,0,Math.PI*2);sc.fill();
  }
}

// ══════════════════════════════════════
// DRAW DOT — multi-ring glow
// ══════════════════════════════════════
function drawDot(x,y,color,r,bright=1){
  ctx.save();
  // Soft outer halo
  const g=ctx.createRadialGradient(x,y,0,x,y,r*5);
  g.addColorStop(0,ha(color,0.22*bright));
  g.addColorStop(0.4,ha(color,0.08*bright));
  g.addColorStop(1,ha(color,0));
  ctx.fillStyle=g;ctx.beginPath();ctx.arc(x,y,r*5,0,Math.PI*2);ctx.fill();
  // Mid ring
  ctx.shadowColor=color;ctx.shadowBlur=16*bright;
  ctx.strokeStyle=ha(color,0.6*bright);ctx.lineWidth=0.8;
  ctx.beginPath();ctx.arc(x,y,r*1.8,0,Math.PI*2);ctx.stroke();
  // Core
  ctx.shadowBlur=10*bright;ctx.fillStyle=color;
  ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();
  // Nucleus
  ctx.shadowBlur=0;ctx.fillStyle='rgba(255,255,255,0.9)';
  ctx.beginPath();ctx.arc(x,y,r*.32,0,Math.PI*2);ctx.fill();
  ctx.restore();
}

// ══════════════════════════════════════
// THIN LASER STRING — 4 passes
// ══════════════════════════════════════
function drawString(x1,y1,x2,y2,cCore,cGlow,alpha,mx,my){
  if(alpha<0.02)return;
  ctx.save();

  // Pass 1 — ultra-soft wide bloom
  const g1=ctx.createLinearGradient(x1,y1,x2,y2);
  g1.addColorStop(0,ha(cGlow,alpha*0.12));
  g1.addColorStop(.5,ha(cCore,alpha*0.18));
  g1.addColorStop(1,ha(cGlow,alpha*0.12));
  ctx.strokeStyle=g1;ctx.lineWidth=9;ctx.lineCap='round';
  ctx.shadowColor=cGlow;ctx.shadowBlur=28;ctx.globalAlpha=1;
  ctx.beginPath();ctx.moveTo(x1,y1);ctx.quadraticCurveTo(mx,my,x2,y2);ctx.stroke();

  // Pass 2 — medium glow
  const g2=ctx.createLinearGradient(x1,y1,x2,y2);
  g2.addColorStop(0,ha(cGlow,alpha*.55));
  g2.addColorStop(.5,ha(cCore,alpha*.7));
  g2.addColorStop(1,ha(cGlow,alpha*.55));
  ctx.strokeStyle=g2;ctx.lineWidth=2.2;
  ctx.shadowColor=cCore;ctx.shadowBlur=12;
  ctx.beginPath();ctx.moveTo(x1,y1);ctx.quadraticCurveTo(mx,my,x2,y2);ctx.stroke();

  // Pass 3 — thin bright core
  const g3=ctx.createLinearGradient(x1,y1,x2,y2);
  g3.addColorStop(0,ha(cCore,alpha*.9));
  g3.addColorStop(.5,'#ffffff');
  g3.addColorStop(1,ha(cCore,alpha*.9));
  ctx.strokeStyle=g3;ctx.lineWidth=0.7;
  ctx.shadowColor='#fff';ctx.shadowBlur=6;
  ctx.beginPath();ctx.moveTo(x1,y1);ctx.quadraticCurveTo(mx,my,x2,y2);ctx.stroke();

  // Pass 4 — tiny dashes of energy (shimmer)
  const segs=14;
  for(let s=0;s<segs;s++){
    if(Math.random()>0.35)continue;
    const t0=s/segs, t1=(s+0.5)/segs;
    const bx0=qbez(x1,mx,x2,t0),by0=qbez(y1,my,y2,t0);
    const bx1=qbez(x1,mx,x2,t1),by1=qbez(y1,my,y2,t1);
    ctx.strokeStyle=ha('#ffffff',alpha*0.35*Math.random());
    ctx.lineWidth=0.4;ctx.shadowBlur=0;
    ctx.beginPath();ctx.moveTo(bx0,by0);ctx.lineTo(bx1,by1);ctx.stroke();
  }
  ctx.restore();
}

function qbez(a,b,c,t){return (1-t)*(1-t)*a+2*(1-t)*t*b+t*t*c;}

// ══════════════════════════════════════
// SKELETON EDGE
// ══════════════════════════════════════
function drawEdge(pa,pb,color){
  ctx.save();
  ctx.shadowColor=color;ctx.shadowBlur=6;
  ctx.strokeStyle=ha(color,0.35);ctx.lineWidth=0.9;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(pa.x,pa.y);ctx.lineTo(pb.x,pb.y);ctx.stroke();
  ctx.restore();
}

// ══════════════════════════════════════
// TRAIL
// ══════════════════════════════════════
function pushTrail(key,fi,x,y){
  const t=trails[key][fi];
  t.push({x,y});
  if(t.length>TRAIL_LEN)t.shift();
}
function drawTrail(trail,color){
  if(trail.length<3)return;
  ctx.save();
  for(let i=1;i<trail.length;i++){
    const a=trail[i-1],b=trail[i];
    const p=i/trail.length;
    ctx.shadowColor=color;ctx.shadowBlur=8;
    ctx.strokeStyle=ha(color,p*0.55);ctx.lineWidth=p*2.5;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();
  }
  ctx.restore();
}

// ══════════════════════════════════════
// PARTICLES
// ══════════════════════════════════════
function burst(x,y,cA,cB,n=30){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2, sp=2+Math.random()*6;
    particles.push({
      x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-2,
      life:1,decay:0.018+Math.random()*0.03,
      r:1.5+Math.random()*3.5,
      color:Math.random()<.5?cA:cB,
      spark:Math.random()<.25,glow:12+Math.random()*12
    });
  }
}
function spawnRing(x,y,c){rings.push({x,y,r:0,maxR:100,color:c,a:0.85});}

function tickParticles(){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.1;p.vx*=0.97;p.life-=p.decay;
    if(p.life<=0){particles.splice(i,1);continue;}
    ctx.save();ctx.globalAlpha=p.life;
    ctx.shadowColor=p.color;ctx.shadowBlur=p.glow;
    ctx.fillStyle=p.spark?'#fff':p.color;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }
}
function tickRings(){
  for(let i=rings.length-1;i>=0;i--){
    const r=rings[i];r.r+=5;r.a-=0.038;
    if(r.a<=0){rings.splice(i,1);continue;}
    ctx.save();ctx.globalAlpha=r.a;
    ctx.shadowColor=r.color;ctx.shadowBlur=20;
    ctx.strokeStyle=r.color;ctx.lineWidth=1.2;
    ctx.beginPath();ctx.arc(r.x,r.y,r.r,0,Math.PI*2);ctx.stroke();
    ctx.restore();
  }
}

// ══════════════════════════════════════
// TOUCH
// ══════════════════════════════════════
function checkTouch(lx,ly,rx,ry,fi,now){
  if(dist(lx,ly,rx,ry)<TOUCH_PX&&now-lastTouch[fi]>TOUCH_CD){
    lastTouch[fi]=now;
    const mx=(lx+rx)/2,my=(ly+ry)/2;
    const [cA,cB]=F_COLORS[fi];
    burst(mx,my,cA,cB,35);
    spawnRing(mx,my,cA);spawnRing(mx,my,cB);
  }
}

// ══════════════════════════════════════
// HAND
// ══════════════════════════════════════
function drawHand(lms,base,key){
  EDGES.forEach(([a,b])=>drawEdge(px(lms[a]),px(lms[b]),base));
  lms.forEach((lm,i)=>{
    const p=px(lm);
    const fi=TIP_IDS.indexOf(i);
    const tip=fi!==-1;
    const col=JOINT_PAL[i%JOINT_PAL.length];
    if(tip){pushTrail(key,fi,p.x,p.y);drawTrail(trails[key][fi],col);}
    drawDot(p.x,p.y,col,tip?JOINT_R*1.9:JOINT_R*0.75,tip?1.3:.7);
  });
}

// ══════════════════════════════════════
// MAIN LOOP
// ══════════════════════════════════════
buildStars();

function draw(){
  requestAnimationFrame(draw);
  const now=performance.now();

  // FPS
  fpsF++;
  if(now-fpsT>900){fpsEl.textContent=Math.round(fpsF/(now-fpsT)*1000)+' FPS';fpsF=0;fpsT=now;}

  // BG fade — deep midnight
  ctx.fillStyle='rgba(1,3,16,0.5)';ctx.fillRect(0,0,W,H);

  // Stars
  if(starCanvas)ctx.drawImage(starCanvas,0,0);

  // Nebula
  drawNebulae(now);

  const L=hData['Right'], R=hData['Left'];
  const hasL=!!L, hasR=!!R;

  if(hasL) drawHand(L,'#00f5ff','L');
  if(hasR) drawHand(R,'#ff00e5','R');

  if(hasL&&hasR){
    statusEl.textContent='✦  S T R I N G S  A C T I V E  ✦';

    TIP_IDS.forEach((tid,fi)=>{
      const lp=px(L[tid]), rp=px(R[tid]);
      const sp=springs[fi];

      // Spring init
      if(!sp.init){sp.lx=lp.x;sp.ly=lp.y;sp.rx=rp.x;sp.ry=rp.y;sp.init=true;}

      // Spring step for both endpoints
      let sl=springStep(sp.lx,sp.lvx,lp.x); sp.lx=sl.p;sp.lvx=sl.v;
      let sl2=springStep(sp.ly,sp.lvy,lp.y); sp.ly=sl2.p;sp.lvy=sl2.v;
      let sr=springStep(sp.rx,sp.rvx,rp.x); sp.rx=sr.p;sp.rvx=sr.v;
      let sr2=springStep(sp.ry,sp.rvy,rp.y); sp.ry=sr2.p;sp.rvy=sr2.v;

      const dx=sp.lx-sp.rx, dy=sp.ly-sp.ry;
      const d=Math.sqrt(dx*dx+dy*dy)||1;
      const norm=Math.min(d/MAX_DIST,1);
      const alpha=lerp(1,0.12,norm);
      const [cCore,cGlow]=F_COLORS[fi];

      // Multiple sag oscillations layered
      const sag1=d*0.07*Math.sin(now*0.00085+fi*1.4);
      const sag2=d*0.025*Math.sin(now*0.0022+fi*0.9+1);
      const sag=sag1+sag2;
      const inv=1/d;
      const mx=(sp.lx+sp.rx)/2+dy*inv*sag;
      const my=(sp.ly+sp.ry)/2-dx*inv*sag;

      drawString(sp.lx,sp.ly,sp.rx,sp.ry,cCore,cGlow,alpha,mx,my);

      // Midpoint jewel
      const jx=qbez(sp.lx,mx,sp.rx,.5), jy=qbez(sp.ly,my,sp.ry,.5);
      if(alpha>0.3) drawDot(jx,jy,cCore,2.5*alpha,1.3);

      // Quarter-point jewels (subtle)
      if(alpha>0.6){
        const q1x=qbez(sp.lx,mx,sp.rx,.25),q1y=qbez(sp.ly,my,sp.ry,.25);
        const q2x=qbez(sp.lx,mx,sp.rx,.75),q2y=qbez(sp.ly,my,sp.ry,.75);
        drawDot(q1x,q1y,cGlow,1.5,0.7);
        drawDot(q2x,q2y,cGlow,1.5,0.7);
      }

      checkTouch(sp.lx,sp.ly,sp.rx,sp.ry,fi,now);
    });

    // Cross-weave: connect each left fingertip to the NEXT right fingertip
    TIP_IDS.forEach((tid,fi)=>{
      const next=(fi+1)%5;
      const lp=px(L[tid]), rp=px(R[TIP_IDS[next]]);
      const d=dist(lp.x,lp.y,rp.x,rp.y);
      if(d>MAX_DIST*0.85)return;
      const norm=d/MAX_DIST;
      const alpha=lerp(0.28,0,norm);
      const [cA]=F_COLORS[fi],[cB]=F_COLORS[next];
      const mx2=(lp.x+rp.x)/2, my2=(lp.y+rp.y)/2;
      drawString(lp.x,lp.y,rp.x,rp.y,cA,cB,alpha*0.55,mx2,my2);
    });

  } else {
    springs.forEach(s=>s.init=false);
    if(!hasL)trails.L.forEach(t=>t.length=0);
    if(!hasR)trails.R.forEach(t=>t.length=0);
    statusEl.textContent=hasL||hasR?'SHOW SECOND HAND…':'SHOW BOTH HANDS';
  }

  tickRings();
  tickParticles();
}

draw();
</script>
</body>
</html>
